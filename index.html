<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOOG SYNTH PRO+</title>
<style>
body{
  margin:0;
  background:#2b2b2b;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.panel{
  width:420px;
  background:#3a2f2f;
  border-radius:12px;
  padding:10px;
  color:#f0d090;
}

/* frame */
.frame{
  border:2px solid #f0d090;
  padding:6px;
  overflow:hidden;
}

/* tighter grid */
.grid{
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:1px;
}

.block{
  display:flex;
  flex-direction:column;
  align-items:center;
}

input[type=range].v{
  writing-mode:bt-lr;
  -webkit-appearance:slider-vertical;
  height:100px;
  width:16px;
}

input[type=range].h{
  width:100%;
}

.label{
  font-size:10px;
}

button{
  width:100%;
  margin-top:6px;
  padding:6px;
}
</style>
</head>
<body>

<div class="panel">

<div class="frame">
  <div class="grid" id="grid"></div>
</div>

<div class="label">BPM (30-240)</div>
<input type="range" min="30" max="240" value="120" id="bpm" class="h">

<div class="label">FILTER</div>
<input type="range" min="100" max="2000" value="800" id="cutoff" class="h">

<div class="label">RESONANCE</div>
<input type="range" min="0.1" max="20" step="0.1" value="5" id="res" class="h">

<button onclick="toggleSeq()">LOOP</button>
<button onclick="toggleRhythm()">KICK</button>
<button onclick="toggleSnare()">SNARE</button>

</div>

<script>
const ctx=new (window.AudioContext||window.webkitAudioContext)();
let sliders=[];
let step=0;
let playing=false;
let rhythm=false;
let snareOn=false;
let timer;

// sliders
const grid=document.getElementById("grid");
for(let i=0;i<8;i++){
 const b=document.createElement("div");
 const s=document.createElement("input");
 s.type="range"; s.min=0; s.max=10; s.value=5;
 s.className="v";
 s.oninput=()=>play(s.value,i);
 b.appendChild(s);
 grid.appendChild(b);
 sliders.push(s);
}

// synth
function play(v,i){
 const osc=ctx.createOscillator();
 const f=ctx.createBiquadFilter();
 const g=ctx.createGain();

 const cutoff=document.getElementById("cutoff").value;
 const res=document.getElementById("res").value;

 osc.type="sawtooth";
 osc.frequency.value=100 + i*40 + v*20;

 f.type="lowpass";
 f.frequency.value=cutoff;
 f.Q.value=res;

 g.gain.setValueAtTime(0,ctx.currentTime);
 g.gain.linearRampToValueAtTime(0.2,ctx.currentTime+0.01);
 g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);

 osc.connect(f); f.connect(g); g.connect(ctx.destination);

 osc.start();
 osc.stop(ctx.currentTime+0.3);
}

// kick
function kick(){
 const o=ctx.createOscillator();
 const g=ctx.createGain();
 o.frequency.setValueAtTime(150,ctx.currentTime);
 o.frequency.exponentialRampToValueAtTime(50,ctx.currentTime+0.1);
 g.gain.setValueAtTime(0.3,ctx.currentTime);
 g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
 o.connect(g); g.connect(ctx.destination);
 o.start(); o.stop(ctx.currentTime+0.2);
}

// snare
function snare(){
 const noise=ctx.createBufferSource();
 const buffer=ctx.createBuffer(1,44100,44100);
 const data=buffer.getChannelData(0);
 for(let i=0;i<data.length;i++){ data[i]=Math.random()*2-1; }
 noise.buffer=buffer;

 const filter=ctx.createBiquadFilter();
 filter.type="highpass";
 filter.frequency.value=1000;

 const gain=ctx.createGain();
 gain.gain.value=0.2;

 noise.connect(filter);
 filter.connect(gain);
 gain.connect(ctx.destination);

 noise.start();
 noise.stop(ctx.currentTime+0.2);
}

function toggleSeq(){
 playing=!playing;
 if(playing) run(); else clearTimeout(timer);
}

function toggleRhythm(){ rhythm=!rhythm; }
function toggleSnare(){ snareOn=!snareOn; }

function run(){
 const bpm=document.getElementById("bpm").value;

 play(sliders[step].value,step);

 if(rhythm && step%2===0) kick();
 if(snareOn && step%4===2) snare();

 step=(step+1)%8;
 timer=setTimeout(run,60000/bpm);
}
</script>

</body>
</html>
